<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; width: 100%; height: 100%; background: transparent; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script src="AnalogControls.js"></script>
<script src="CustomControls.js"></script>
<script>
const _q    = new URLSearchParams(location.search);
const CTRL  = _q.get('c') || 'slider';
const STYLE = _q.get('s') || 'stainless';
const LBL   = _q.get('lbl') || null;

const SIZES = {
  slider:    [100, 265],
  dial:      [170, 170],
  dialtheme: [140, 140],
  switch2:   [120, 130],
  switchn:   [130, 175],
  vumeter:   [90,  265],
  vudial:    [165, 165],
  xypad:     [260, 260],
  ledmeter:  [200, 110],
  rotary:    [220, 100],
};

let ctrl, lvl = 0;

function setup() {
  const [w, h] = SIZES[CTRL] || [300, 200];
  createCanvas(w, h);
  analogReset();
  AnalogStyle = STYLE;

  if (CTRL === 'slider') {
    ctrl = new AnalogSlider({
      x: 28, y: 35,
      width: 44, height: 180,
      min: 0, max: 1, value: 0.75,
      label: LBL || 'GAIN',
      readout: 'db',
    });
  } else if (CTRL === 'dial') {
    ctrl = new Dial({
      x: 45, y: 35,
      size: 80,
      min: 0, max: 100, value: 65,
      label: LBL || 'LEVEL',
      readout: 'raw', decimals: 0,
    });
  } else if (CTRL === 'dialtheme') {
    ctrl = new Dial({
      x: 35, y: 27,
      size: 70,
      min: 0, max: 1, value: 0.65,
      label: LBL || STYLE.toUpperCase().substring(0, 5),
      readout: 'raw', decimals: 2,
    });
  } else if (CTRL === 'switch2') {
    ctrl = new AnalogSwitch({
      x: 36, y: 22,
      width: 48,
      states: ['OFF', 'ON'],
      label: LBL || 'POWER',
      state: 1,
    });
  } else if (CTRL === 'switchn') {
    ctrl = new AnalogSwitch({
      x: 39, y: 18,
      width: 52,
      states: ['A', 'B', 'C', 'D'],
      label: LBL || 'MODE',
      state: 1,
    });
  } else if (CTRL === 'vumeter') {
    ctrl = new VUMeter({
      x: 23, y: 35,
      width: 44, height: 180,
      showFader: false,
      label: LBL || 'VU',
      meterWidth: 12,
    });
  } else if (CTRL === 'vudial') {
    ctrl = new VUDial({
      x: 43, y: 35,
      size: 80,
      label: LBL || 'VU',
      showKnob: false,
    });
  } else if (CTRL === 'xypad') {
    ctrl = new XYPad({
      x: 20, y: 22,
      width: 220, height: 200,
      minX: -1, maxX: 1,
      minY: -1, maxY: 1,
      valueX: 0, valueY: 0,
      label: LBL || 'XY',
      crosshairColor: '#ff6600',
    });
  } else if (CTRL === 'ledmeter') {
    ctrl = new LEDMeter({
      x: 20, y: 25,
      min: 0, max: 1,
      readout: 'db', decimals: 1, digits: 5,
      label: LBL || 'dB',
    });
  } else if (CTRL === 'rotary') {
    ctrl = new RotarySelector({
      x: 40, y: 22,
      options: ['SINE', 'SQUARE', 'SAW', 'TRI'],
      label: LBL || 'WAVE',
    });
  }
}

function draw() {
  analogBackground();
  if (!ctrl) return;

  if (CTRL === 'vumeter' || CTRL === 'vudial' || CTRL === 'ledmeter') {
    lvl = lerp(lvl, 0.5 + 0.4 * sin(frameCount * 0.035), 0.1);
    lvl += random(-0.025, 0.025);
    lvl = constrain(lvl, 0, 1);
    ctrl.value = lvl;
  }

  ctrl.draw();
}
</script>
</body>
</html>
